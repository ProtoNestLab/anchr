name: Bug Report
description: Report a bug in Anchor SDK
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.

  - type: input
    id: version
    attributes:
      label: SDK Version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      options:
        - '@anchor-sdk/core'
        - '@anchor-sdk/vue'
        - '@anchor-sdk/ui'
      multiple: true
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Environment info, screenshots, error logs, etc.
